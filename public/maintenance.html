  <style>
  body{font-family:'Courier New',monospace;background:#111;color:#eaeaea;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;margin:0}

p{color:#999;font-size:14px;line-height:1.7;max-width:420px;margin:0 auto}
.divider{width:60px;height:2px;background:#e63b2e;margin:20px auto}
</style>
  </head>
  <body>
  <main>
  <div class="code">503</div>
